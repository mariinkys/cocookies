name: Release Docker Images

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Which image to Build and Push'
        required: true
        type: choice
        options:
          - all
          - backend
          - frontend
      tag_name:
        description: 'Tag name for the release (e.g. v1.2.0)'
        required: true
        type: string
      release_name:
        description: 'Display name for the release (e.g. "Release 1.2.0 – Spring Update")'
        required: true
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  publish-backend:
    if: ${{ inputs.service == 'all' || inputs.service == 'backend' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 26
        uses: actions/setup-java@v5
        with:
          java-version: '26'
          distribution: 'temurin'
          cache: maven

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-backend
          tags: |
            type=raw,value=${{ inputs.tag_name }}

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: true

  publish-frontend:
    if: ${{ inputs.service == 'all' || inputs.service == 'frontend' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-frontend
          tags: |
            type=raw,value=${{ inputs.tag_name }}

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: true

  create-release:
    needs: [publish-backend, publish-frontend]
    # Run if BOTH jobs ran, OR if only one ran (i.e., 'all' or a single service)
    if: |
      always() &&
      (needs.publish-backend.result == 'success' || needs.publish-backend.result == 'skipped') &&
      (needs.publish-frontend.result == 'success' || needs.publish-frontend.result == 'skipped') &&
      (needs.publish-backend.result == 'success' || needs.publish-frontend.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create draft release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag_name }}
          name: ${{ inputs.release_name }}
          draft: true
          body: |
            ## Docker Images

            The following GHCR images were published with this release:

            ${{ (inputs.service == 'all' || inputs.service == 'backend') && format('- `ghcr.io/{0}-backend:{1}`', github.repository, inputs.tag_name) || '' }}
            ${{ (inputs.service == 'all' || inputs.service == 'frontend') && format('- `ghcr.io/{0}-frontend:{1}`', github.repository, inputs.tag_name) || '' }}